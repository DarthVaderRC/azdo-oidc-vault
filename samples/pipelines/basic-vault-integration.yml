# Azure DevOps Pipeline - Vault Integration with Managed Identity
# Uses Entra ID JWT tokens (not deprecated Azure DevOps OAuth)
# No Vault CLI required - uses curl commands only

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  VAULT_ADDR: 'https://your-cluster.hashicorp.cloud:8200'
  VAULT_NAMESPACE: 'admin'
  JWT_ROLE: 'dev-pipelines'

steps:
  - task: AzureCLI@2
    displayName: 'Get Entra ID JWT Token'
    inputs:
      azureSubscription: 'vault-managed-identity'  # Service connection name
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      addSpnToEnvironment: true
      inlineScript: |
        echo "================================================"
        echo "Getting JWT Token from Entra ID"
        echo "================================================"
        
        # Get JWT token from Entra ID (not Azure DevOps OAuth)
        JWT_TOKEN=$(az account get-access-token \
          --resource api://AzureADTokenExchange \
          --query accessToken -o tsv)
        
        if [ -z "$JWT_TOKEN" ]; then
          echo "Error: Failed to get JWT token"
          exit 1
        fi
        
        echo "JWT token obtained (length: ${#JWT_TOKEN})"
        
        # Decode and display JWT claims (for debugging)
        echo ""
        echo "JWT Claims:"
        echo "$JWT_TOKEN" | cut -d'.' -f2 | base64 -d 2>/dev/null | jq '.' || echo "(could not decode)"
        
        # Export for next steps
        echo "##vso[task.setvariable variable=JWT_TOKEN;issecret=true]${JWT_TOKEN}"

  - task: Bash@3
    displayName: 'Authenticate to Vault via JWT'
    env:
      VAULT_ADDR: $(VAULT_ADDR)
      VAULT_NAMESPACE: $(VAULT_NAMESPACE)
      JWT_TOKEN: $(JWT_TOKEN)
      JWT_ROLE: $(JWT_ROLE)
    inputs:
      targetType: 'inline'
      script: |
        echo "================================================"
        echo "Authenticating to Vault"
        echo "================================================"
        echo "Vault Address: ${VAULT_ADDR}"
        echo "Namespace: ${VAULT_NAMESPACE}"
        echo "JWT Role: ${JWT_ROLE}"
        echo ""
        
        # Authenticate to Vault using JWT (curl only, no vault CLI)
        AUTH_RESPONSE=$(curl --silent --request POST \
          --header "X-Vault-Namespace: ${VAULT_NAMESPACE}" \
          --data "{\"jwt\": \"${JWT_TOKEN}\", \"role\": \"${JWT_ROLE}\"}" \
          ${VAULT_ADDR}/v1/auth/jwt/login)
        
        # Extract Vault token
        VAULT_TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.auth.client_token')
        
        if [ -z "$VAULT_TOKEN" ] || [ "$VAULT_TOKEN" = "null" ]; then
          echo "Error: Authentication failed"
          echo "Response: $AUTH_RESPONSE"
          exit 1
        fi
        
        echo "✓ Successfully authenticated to Vault!"
        
        # Display entity information (for client count verification)
        ENTITY_ID=$(echo "$AUTH_RESPONSE" | jq -r '.auth.entity_id')
        echo "Entity ID: ${ENTITY_ID}"
        
        # Export Vault token
        echo "##vso[task.setvariable variable=VAULT_TOKEN;issecret=true]${VAULT_TOKEN}"

  - task: Bash@3
    displayName: 'Retrieve Secrets'
    env:
      VAULT_ADDR: $(VAULT_ADDR)
      VAULT_NAMESPACE: $(VAULT_NAMESPACE)
      VAULT_TOKEN: $(VAULT_TOKEN)
    inputs:
      targetType: 'inline'
      script: |
        echo "================================================"
        echo "Retrieving Secrets from Vault"
        echo "================================================"
        
        # Read secrets using curl (no vault CLI)
        SECRET_RESPONSE=$(curl --silent \
          --header "X-Vault-Token: ${VAULT_TOKEN}" \
          --header "X-Vault-Namespace: ${VAULT_NAMESPACE}" \
          ${VAULT_ADDR}/v1/secret/data/dev/app-config)
        
        # Check for errors
        ERRORS=$(echo "$SECRET_RESPONSE" | jq -r '.errors // empty')
        if [ -n "$ERRORS" ]; then
          echo "Error reading secrets: $ERRORS"
          exit 1
        fi
        
        # Extract secret values
        DATABASE_URL=$(echo "$SECRET_RESPONSE" | jq -r '.data.data.database_url')
        API_KEY=$(echo "$SECRET_RESPONSE" | jq -r '.data.data.api_key')
        ENVIRONMENT=$(echo "$SECRET_RESPONSE" | jq -r '.data.data.environment')
        
        echo "✓ Secrets retrieved successfully!"
        echo "  Database URL: ${DATABASE_URL:0:30}..."
        echo "  Environment: ${ENVIRONMENT}"
        echo ""
        
        # Export as masked pipeline variables
        echo "##vso[task.setvariable variable=DATABASE_URL;issecret=true]${DATABASE_URL}"
        echo "##vso[task.setvariable variable=API_KEY;issecret=true]${API_KEY}"
        echo "##vso[task.setvariable variable=ENVIRONMENT;issecret=true]${ENVIRONMENT}"

  - task: Bash@3
    displayName: 'Deploy Application'
    env:
      DATABASE_URL: $(DATABASE_URL)
      API_KEY: $(API_KEY)
      ENVIRONMENT: $(ENVIRONMENT)
    inputs:
      targetType: 'inline'
      script: |
        echo "================================================"
        echo "Deploying Application"
        echo "================================================"
        echo "Environment: ${ENVIRONMENT}"
        echo "Database: ${DATABASE_URL:0:25}..."
        echo "API Key: (masked)"
        echo ""
        
        # Your deployment logic here
        # The secrets are available as environment variables
        
        echo "✓ Application deployed successfully with secrets from Vault!"
        echo "================================================"

